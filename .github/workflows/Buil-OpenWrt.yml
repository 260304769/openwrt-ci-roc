name: Buil-OpenWrt

on:
  workflow_call:
    inputs:
      repo_url:
        required: true
        type: string
      repo_branch:
        required: true
        type: string
      config_file:
        required: true
        type: string
      firmware_tag:
        required: true
        type: string
      kernel_file:
        required: true
        type: string
      artifact_prefix:
        required: true
        type: string
      manifest_file:
        required: true
        type: string
      release_summary:
        required: true
        type: string
      remove_sqm_scripts_nss:
        required: false
        type: boolean
        default: false
      rename_qualcommax_to_nowifi:
        required: false
        type: boolean
        default: false
      delete_old_workflows:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

defaults:
  run:
    shell: bash

env:
  GENERAL_CONFIG_FILE: configs/AX5.config
  DIY_SCRIPT: scripts/AX5.sh
  TZ: Asia/Shanghai
  OPENWRT_MIRROR: "https://mirrors.tuna.tsinghua.edu.cn/openwrt"

jobs:
  Build:
    runs-on: ubuntu-24.04
    timeout-minutes: 420
    concurrency:
      group: openwrt-${{ inputs.artifact_prefix }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
    - name: Check Server Performance
      run: |
        echo "警告⚠ 服务器性能有限，插件较多时编译耗时会增加"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(grep "physical id" /proc/cpuinfo | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(grep name /proc/cpuinfo | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB || echo "No memory info") \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* 2>/dev/null | grep -v [1-9] | wc -l)"
        df -hT

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends) ccache
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout
      uses: actions/checkout@v4

    - name: Clone Source Code
      env:
        REPO_URL: ${{ inputs.repo_url }}
        REPO_BRANCH: ${{ inputs.repo_branch }}
        KERNEL_FILE: ${{ inputs.kernel_file }}
      run: |
        df -hT "$GITHUB_WORKSPACE"
        sudo mkdir -p /mnt/openwrt
        sudo chown -R "$(id -u):$(id -g)" /mnt/openwrt
        git clone --depth 1 -b "$REPO_BRANCH" --single-branch "$REPO_URL" /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> "$GITHUB_ENV"
        VERSION_INFO="$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")"
        {
          echo "VERSION_INFO<<EOF"
          echo "$VERSION_INFO"
          echo "EOF"
        } >> "$GITHUB_ENV"
        VERSION_KERNEL=$(sed -n 's/^LINUX_KERNEL_HASH-\([0-9.]*\).*/\1/p' "target/linux/generic/$KERNEL_FILE" | head -n 1 || true)
        echo "VERSION_KERNEL=${VERSION_KERNEL:-unknown}" >> "$GITHUB_ENV"

    - name: Setup ccache
      run: |
        echo "CCACHE_DIR=$OPENWRT_PATH/.ccache" >> $GITHUB_ENV
        echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
        echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
        echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
        ccache -s

    - name: Generate Variables
      env:
        REPO_URL: ${{ inputs.repo_url }}
        REPO_BRANCH: ${{ inputs.repo_branch }}
      run: |
        cd "$OPENWRT_PATH"
        DEVICE_TARGET=$(awk -F '"' '/CONFIG_TARGET_BOARD/ {print $2; exit}' .config 2>/dev/null || echo "unknown")
        DEVICE_SUBTARGET=$(awk -F '"' '/CONFIG_TARGET_SUBTARGET/ {print $2; exit}' .config 2>/dev/null || echo "unknown")
        HASH="$(git log -1 --pretty=format:'%h')"
        SOURCE_REPO="${REPO_URL##*/}"
        SOURCE_REPO="${SOURCE_REPO%.git}"
        CACHE_PREFIX="${SOURCE_REPO}-${REPO_BRANCH}-${DEVICE_TARGET}-${DEVICE_SUBTARGET}"
        CACHE_KEY="${CACHE_PREFIX}-${HASH}"
        {
          echo "SOURCE_REPO=$SOURCE_REPO"
          echo "DEVICE_TARGET=$DEVICE_TARGET"
          echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET"
          echo "HASH=$HASH"
          echo "CACHE_PREFIX=$CACHE_PREFIX"
          echo "CACHE_KEY=$CACHE_KEY"
        } >> "$GITHUB_ENV"

    - name: Cache Toolchain
      uses: actions/cache@v4
      with:
        key: ${{ env.CACHE_KEY }}
        restore-keys: |
          ${{ env.CACHE_PREFIX }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir
          ${{ env.OPENWRT_PATH }}/dl

    - name: Refresh The Cache
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -path "*/stamp/*" ! -path "*target*" -type f -exec touch {} + || true
        fi

    - name: Install Feeds
      run: |
        cd "$OPENWRT_PATH"
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        chmod +x "$GITHUB_WORKSPACE/$DIY_SCRIPT"
        cd "$OPENWRT_PATH"
        "$GITHUB_WORKSPACE/$DIY_SCRIPT"

    - name: Download DL Package
      env:
        CONFIG_FILE: ${{ inputs.config_file }}
      run: |
        if [ ! -f "$GITHUB_WORKSPACE/$CONFIG_FILE" ]; then
          echo "❌ Error: Config file not found: $GITHUB_WORKSPACE/$CONFIG_FILE"
          exit 1
        fi
        cp "$GITHUB_WORKSPACE/$CONFIG_FILE" "$OPENWRT_PATH/.config"
        cd "$OPENWRT_PATH"
        make defconfig
        sed -i "s|https://downloads.openwrt.org|$OPENWRT_MIRROR|g" include/download.mk
        sed -i "s|http://downloads.openwrt.org|$OPENWRT_MIRROR|g" include/download.mk
        make download -j"$(nproc)" DOWNLOAD_FLAGS="--connect-timeout 30 --max-time 600 --retry 5"

    - name: Compile Firmware
      id: compile
      run: |
        cd "$OPENWRT_PATH"
        echo "使用线程数: $(nproc)"
        make tools/compile -j$(nproc)
        make toolchain/compile -j$(nproc)
        if ! make -j"$(nproc)"; then
          echo "⚠️ 多线程编译失败，切换单核重试"
          if ! make -j1; then
            echo "❌ 编译失败，输出详细日志"
            make -j1 V=s
            exit 1
          fi
        fi
        echo "status=success" >> "$GITHUB_OUTPUT"
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> "$GITHUB_ENV"
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> "$GITHUB_ENV"

    - name: Check Space Usage
      if: (!cancelled())
      run: df -hT

    - name: Organize Files
      if: steps.compile.outputs.status == 'success'
      env:
        ARTIFACT_PREFIX: ${{ inputs.artifact_prefix }}
        MANIFEST_FILE: ${{ inputs.manifest_file }}
      run: |
        BIN_DIR="${OPENWRT_PATH}/bin/targets"
        cd $(find "${BIN_DIR}" -maxdepth 3 -type d -name "*bin" -o -name "*img" | head -1) || cd "${BIN_DIR}"/*/*
        cp "${OPENWRT_PATH}/.config" "${ARTIFACT_PREFIX}.config"
        [ -f config.buildinfo ] && mv config.buildinfo "${ARTIFACT_PREFIX}.config.buildinfo"
        [ -f "${MANIFEST_FILE}" ] && mv "${MANIFEST_FILE}" "${ARTIFACT_PREFIX}.manifest"
        mkdir -p packages
        mv -f "${OPENWRT_PATH}"/bin/packages/*/*/*.apk packages 2>/dev/null || true
        tar -zcf "${ARTIFACT_PREFIX}.Packages.tar.gz" packages
        if [ "${{ inputs.rename_qualcommax_to_nowifi }}" = "true" ]; then
          for file in *qualcommax*.bin; do
            [ -e "$file" ] && mv "$file" "${file//qualcommax/nowifi}"
          done
        fi
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> "$GITHUB_ENV"

    - name: Upload Firmware To Release
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.DATE }} for ${{ inputs.firmware_tag }}
        allowUpdates: true
        tag: ${{ inputs.firmware_tag }}
        token: ${{ github.token }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ inputs.firmware_tag }}**
          ### 📒 固件信息
          - ${{ inputs.release_summary }}
          - 💻 这是 ${{ inputs.firmware_tag }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ inputs.repo_url }}
          - 💝 源码分支: ${{ inputs.repo_branch }}
          - 🌐 默认地址: **192.168.10.1**
          - 🔑 默认密码: none
          ### 🧊 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ inputs.repo_url }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache
      if: steps.compile.outputs.status == 'success'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh cache list --key "${CACHE_PREFIX}-" --json key --jq '.[].key' |
          while read -r key; do
            [ -n "$key" ] || continue
            if [ "$key" != "$CACHE_KEY" ]; then
              gh cache delete "$key" || true
            fi
          done
        echo "========cache status========"
        ccache -s
        if [ -d "${OPENWRT_PATH}/staging_dir" ]; then
          echo "staging: $(du -sh "${OPENWRT_PATH}/staging_dir" | cut -f 1)"
        fi

    - name: Delete Old Workflows
      if: ${{ inputs.delete_old_workflows }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        cutoff="$(date -u -d '2 days ago' +%s)"
        gh run list --limit 100 --json databaseId,createdAt,status --jq '.[] | select(.status != "in_progress" and .status != "queued") | [.databaseId, .createdAt] | @tsv' |
          while IFS=$'\t' read -r run_id created_at; do
            run_ts="$(date -u -d "$created_at" +%s)"
            if [ "$run_ts" -lt "$cutoff" ]; then
              gh run delete "$run_id" || true
            fi
          done
