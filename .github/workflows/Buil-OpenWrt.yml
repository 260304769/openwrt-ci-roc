name: Build-OpenWrt

on:
  workflow_call:
    inputs:
      repo_url:
        required: true
        type: string
      repo_branch:
        required: true
        type: string
      config_file:
        required: true
        type: string
      firmware_tag:
        required: true
        type: string
      kernel_file:
        required: true
        type: string
      artifact_prefix:
        required: true
        type: string
      manifest_file:
        required: true
        type: string
      release_summary:
        required: true
        type: string
      remove_sqm_scripts_nss:
        required: false
        type: boolean
        default: false
      rename_qualcommax_to_nowifi:
        required: false
        type: boolean
        default: false
      delete_old_workflows:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DIY_SCRIPT: scripts/AX5.sh
  TZ: Asia/Shanghai
  # 代理配置（需要时取消注释并填写实际地址）
  # GIT_PROXY: http://127.0.0.1:7890

jobs:
  Build:
    runs-on: ubuntu-24.04
    timeout-minutes: 420
    concurrency:
      group: openwrt-ax5-${{ github.ref }}
      cancel-in-progress: false

    steps:
    - name: Initialize Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "CPU: $(nproc)核 | 内存: $(free -h | awk '/^Mem:/{print $2}') | 磁盘: $(df -h / | awk 'NR==2{print $4}')"
        sudo -E apt-get -y update -qq
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends) 2>&1 | tail -5
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"
        sudo sysctl -w fs.file-max=65536 vm.swappiness=10 2>/dev/null || true

    - name: Checkout(检出代码)
      uses: actions/checkout@v4

    - name: Clone Source Code(克隆源代码)
      run: |
        sudo mkdir -p /mnt/openwrt
        sudo chown -R "$(id -u):$(id -g)" /mnt/openwrt
        cd /mnt/openwrt
        
        if [ -n "${GIT_PROXY}" ] && [ "${GIT_PROXY}" != "null" ]; then
          git config http.proxy "${GIT_PROXY}"
          git config https.proxy "${GIT_PROXY}"
          echo "✅ 已设置 Git 代理: ${GIT_PROXY}"
        fi
        
        if [ -d /mnt/openwrt/.git ]; then
          git fetch origin "${{ inputs.repo_branch }}" --depth=1 2>/dev/null || { 
            rm -rf /mnt/openwrt
            git clone --depth 1 -b "${{ inputs.repo_branch }}" "${{ inputs.repo_url }}" /mnt/openwrt
          }
          git reset --hard "origin/${{ inputs.repo_branch }}" 2>/dev/null || true
          git clean -fd 2>/dev/null || true
        else
          git clone --depth 1 -b "${{ inputs.repo_branch }}" "${{ inputs.repo_url }}" /mnt/openwrt
        fi
        
        if [ -n "${GIT_PROXY}" ] && [ "${GIT_PROXY}" != "null" ]; then
          git config --unset http.proxy || true
          git config --unset https.proxy || true
          echo "✅ 已取消 Git 代理"
        fi
        
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> "$GITHUB_ENV"
        VERSION_INFO="$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")"
        { echo "VERSION_INFO<<EOF"; echo "$VERSION_INFO"; echo "EOF"; } >> "$GITHUB_ENV"
        
        # 内核版本检测（默认 6.12）
        if [ -f "target/linux/generic/Makefile" ]; then
          VERSION_KERNEL="$(grep -oP 'KERNEL_PATCHVER:=\K[0-9]+\.[0-9]+' target/linux/generic/Makefile 2>/dev/null)"
        fi
        if [ -z "$VERSION_KERNEL" ] && [ -f "include/kernel-version.mk" ]; then
          VERSION_KERNEL="$(grep -oP 'LINUX_VERSION-\K[0-9]+\.[0-9]+' include/kernel-version.mk 2>/dev/null | head -1)"
        fi
        VERSION_KERNEL="${VERSION_KERNEL:-6.12}"
        echo "VERSION_KERNEL=${VERSION_KERNEL}" >> "$GITHUB_ENV"
        echo "✅ 源码: $(git log -1 --pretty=format:'%h') | 内核: $VERSION_KERNEL"

    - name: Generate Variables(加载配置并去重)
      id: config
      run: |
        cd "$OPENWRT_PATH"
        cat "$GITHUB_WORKSPACE/${{ inputs.config_file }}" > .config
        sed -i 's/^# \(CONFIG_[A-Za-z0-9_-]*\) is not set/\1=n/' .config
        awk -F'=' '!seen[$1]++' .config > .config.tmp && mv .config.tmp .config
        make defconfig > /dev/null 2>&1
        
        # 修正 NSS 配置
        sed -i 's/CONFIG_FEED_nss_packages=y/CONFIG_FEED_nss_packages=n/g' .config 2>/dev/null || true
        make defconfig > /dev/null 2>&1
        
        SOURCE_REPO="${{ inputs.repo_url }}"; SOURCE_REPO="${SOURCE_REPO##*/}"; SOURCE_REPO="${SOURCE_REPO%.git}"
        DEVICE_TARGET="$(awk -F '"' '/CONFIG_TARGET_BOARD/ {print $2; exit}' .config)"
        DEVICE_SUBTARGET="$(awk -F '"' '/CONFIG_TARGET_SUBTARGET/ {print $2; exit}' .config)"
        SHORT_HASH="$(git log -1 --pretty=format:'%h')"
        DEVICE_COUNT="2"
        echo "SOURCE_REPO=$SOURCE_REPO" >> "$GITHUB_ENV"
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> "$GITHUB_ENV"
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> "$GITHUB_ENV"
        echo "SHORT_HASH=$SHORT_HASH" >> "$GITHUB_ENV"
        echo "device_count=$DEVICE_COUNT" >> "$GITHUB_OUTPUT"
        echo "  目标: $DEVICE_TARGET / $DEVICE_SUBTARGET ($DEVICE_COUNT 个设备)"

    - name: Cache Toolchain(缓存工具链)
      id: cache
      uses: actions/cache@v4
      with:
        key: ax5-${{ env.SOURCE_REPO }}-${{ inputs.repo_branch }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.SHORT_HASH }}
        restore-keys: |
          ax5-${{ env.SOURCE_REPO }}-${{ inputs.repo_branch }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
          ax5-${{ env.SOURCE_REPO }}-${{ inputs.repo_branch }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir
          ${{ env.OPENWRT_PATH }}/dl

    - name: Refresh Cache Timestamps(刷新缓存时间戳)
      if: steps.cache.outputs.cache-hit == 'true'
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
            find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        cd "$OPENWRT_PATH"
        for i in 1 2 3; do ./scripts/feeds update -a && break || sleep 8; done
        ./scripts/feeds install -a

    - name: Load Custom Configuration(执行自定义脚本)
      run: |
        SCRIPT="$GITHUB_WORKSPACE/$DIY_SCRIPT"
        chmod +x "$SCRIPT"
        cd "$OPENWRT_PATH"
        bash "$SCRIPT"

    - name: Download Dependencies(下载依赖)
      run: |
        cd "$OPENWRT_PATH"
        for i in 1 2 3; do make download -j"$(nproc)" V=s 2>&1 | tail -10 && break || sleep 10; done

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd "$OPENWRT_PATH"
        echo "编译线程: $(nproc) | 设备数量: ${{ steps.config.outputs.device_count }}"
        make -j"$(nproc)" V=s 2>&1 | tee /tmp/build.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "多线程编译失败，错误摘要:"
          grep -i "error\|failed" /tmp/build.log | tail -20
          echo "尝试单线程编译..."
          make -j1 V=s 2>&1 | tail -80
          exit 1
        fi
        echo "status=success" >> "$GITHUB_OUTPUT"
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> "$GITHUB_ENV"

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT /mnt/openwrt

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        if [ -d "$OPENWRT_PATH/bin/targets/qualcommax/ipq60xx" ]; then
          cd "$OPENWRT_PATH/bin/targets/qualcommax/ipq60xx"
        elif [ -d "$OPENWRT_PATH/bin/targets/qualcommax" ]; then
          cd "$OPENWRT_PATH/bin/targets/qualcommax"/*/
        else
          cd "$OPENWRT_PATH/bin/targets"/*/*/
        fi
        echo "当前目录: $(pwd)"
        echo "固件列表:"
        ls -lah *.bin 2>/dev/null || ls -lah *.ubi 2>/dev/null
        
        cp "$OPENWRT_PATH/.config" AX5.config 2>/dev/null || true
        cp config.buildinfo AX5.buildinfo 2>/dev/null || true
        ls *.manifest 2>/dev/null | head -1 | xargs -I{} cp {} AX5.manifest 2>/dev/null || true
        
        mkdir -p packages
        find "$OPENWRT_PATH"/bin/packages -name "*.apk" -o -name "*.ipk" 2>/dev/null | head -500 | while read p; do
          cp "$p" packages/ 2>/dev/null || true
        done
        if [ "$(ls -A packages 2>/dev/null)" ]; then
          tar -zcf AX5.Packages.tar.gz packages
        fi
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json 2>/dev/null || true
        
        echo "FIRMWARE_PATH=$PWD" >> "$GITHUB_ENV"
        echo "===== 发布文件 ====="
        ls -lah

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.DATE }} for AX5
        allowUpdates: true
        tag: ${{ inputs.firmware_tag }}
        token: ${{ github.token }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **OpenWrt for 红米 AX5**
          - ✅ NSS 全加速 | ${{ env.VERSION_KERNEL }} 内核
          - ✅ PPPoE IPv4 + FullCone NAT + BBR
          - ✅ IPv6 完整支持 | 防火墙优化
          - ✅ PassWall + Zerotier + FRP + Lucky
          - 🌐 192.168.10.1 | 密码: 无
          - 内核: **${{ env.VERSION_KERNEL }}**
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Releases(删除旧Release)
      if: steps.compile.outputs.status == 'success'
      run: |
        gh release list --limit 100 --json tagName,name | jq -r '.[].tagName' | grep "${{ inputs.firmware_tag }}" | tail -n +4 | while read tag; do
          gh release delete "$tag" --yes --cleanup-tag || true
        done
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Delete Old Cache(删除旧缓存)
      if: always() && !cancelled()
      run: |
        gh cache list --limit 100 --json id,key,lastAccessedAt 2>/dev/null | jq -r 'sort_by(.lastAccessedAt) | reverse | .[3:] | .[].id' 2>/dev/null | while read id; do
          [ -n "$id" ] && gh cache delete "$id" --repo ${{ github.repository }} || true
        done
        du -sh "$OPENWRT_PATH/.ccache" "$OPENWRT_PATH/staging_dir" "$OPENWRT_PATH/dl" 2>/dev/null || true
      env:
        GH_TOKEN: ${{ github.token }}
