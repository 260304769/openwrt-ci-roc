name: Buil-OpenWrt

on:
  workflow_call:
    inputs:
      repo_url:
        required: true
        type: string
      repo_branch:
        required: true
        type: string
      config_file:
        required: true
        type: string
      firmware_tag:
        required: true
        type: string
      kernel_file:
        required: true
        type: string
      artifact_prefix:
        required: true
        type: string
      manifest_file:
        required: true
        type: string
      release_summary:
        required: true
        type: string
      remove_sqm_scripts_nss:
        required: false
        type: boolean
        default: false
      rename_qualcommax_to_nowifi:
        required: false
        type: boolean
        default: false
      delete_old_workflows:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

defaults:
  run:
    shell: bash

env:
  GENERAL_CONFIG_FILE: configs/AX5.config
  DIY_SCRIPT: scripts/AX5.sh
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    concurrency:
      group: openwrt-${{ inputs.artifact_prefix }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
    - name: Check Server Performance(жЈҖжҹҘжңҚеҠЎеҷЁжҖ§иғҪ)
      run: |
        echo "иӯҰе‘Ҡвҡ "
        echo "еҲҶй…Қзҡ„жңҚеҠЎеҷЁжҖ§иғҪжңүйҷҗпјҢиӢҘйҖүжӢ©зҡ„жҸ’д»¶иҝҮеӨҡпјҢеҠЎеҝ…жіЁж„ҸCPUжҖ§иғҪпјҒ"
        echo -e "е·ІзҹҘCPUеһӢеҸ·пјҲйҷҚеәҸпјүпјҡ7763пјҢ8370CпјҢ8272CLпјҢ8171MпјҢE5-2673 \n"
        echo "--------------------------CPUдҝЎжҒҜ--------------------------"
        echo "CPUзү©зҗҶж•°йҮҸпјҡ$(grep "physical id" /proc/cpuinfo | sort | uniq | wc -l)"
        echo -e "CPUж ёеҝғдҝЎжҒҜпјҡ$(grep name /proc/cpuinfo | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------еҶ…еӯҳдҝЎжҒҜ--------------------------"
        echo "е·Іе®үиЈ…еҶ…еӯҳиҜҰз»ҶдҝЎжҒҜпјҡ"
        echo -e "$(sudo lshw -short -C memory | grep GiB || echo "No memory info") \n"
        echo "--------------------------зЎ¬зӣҳдҝЎжҒҜ--------------------------"
        echo "зЎ¬зӣҳж•°йҮҸпјҡ$(ls /dev/sd* 2>/dev/null | grep -v [1-9] | wc -l)"
        df -hT

    - name: Initialization Environment(еҲқе§ӢеҢ–зҺҜеўғ)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(жЈҖеҮәд»Јз Ғ)
      uses: actions/checkout@v4

    - name: Clone Source Code(е…ӢйҡҶжәҗд»Јз Ғ)
      env:
        REPO_URL: ${{ inputs.repo_url }}
        REPO_BRANCH: ${{ inputs.repo_branch }}
        KERNEL_FILE: ${{ inputs.kernel_file }}
      run: |
        df -hT "$GITHUB_WORKSPACE"
        sudo mkdir -p /mnt/openwrt
        sudo chown -R "$(id -u):$(id -g)" /mnt/openwrt
        git clone --depth 1 -b "$REPO_BRANCH" --single-branch "$REPO_URL" /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> "$GITHUB_ENV"
        VERSION_INFO="$(git show -s --date=short --format="дҪңиҖ…: %an<br/>ж—¶й—ҙ: %cd<br/>еҶ…е®№: %s<br/>hash: %H")"
        {
          echo "VERSION_INFO<<EOF"
          echo "$VERSION_INFO"
          echo "EOF"
        } >> "$GITHUB_ENV"
        VERSION_KERNEL=$(sed -n 's/^LINUX_KERNEL_HASH-\([0-9.]*\).*/\1/p' "target/linux/generic/$KERNEL_FILE" | head -n 1 || true)
        echo "VERSION_KERNEL=${VERSION_KERNEL:-unknown}" >> "$GITHUB_ENV"

    - name: Generate Variables(з”ҹжҲҗеҸҳйҮҸ)
      env:
        REPO_URL: ${{ inputs.repo_url }}
        REPO_BRANCH: ${{ inputs.repo_branch }}
      run: |
        cd "$OPENWRT_PATH"
        DEVICE_TARGET=$(awk -F '"' '/CONFIG_TARGET_BOARD/ {print $2; exit}' .config 2>/dev/null || echo "unknown")
        DEVICE_SUBTARGET=$(awk -F '"' '/CONFIG_TARGET_SUBTARGET/ {print $2; exit}' .config 2>/dev/null || echo "unknown")
        HASH="$(git log -1 --pretty=format:'%h')"
        SOURCE_REPO="${REPO_URL##*/}"
        SOURCE_REPO="${SOURCE_REPO%.git}"
        CACHE_PREFIX="${SOURCE_REPO}-${REPO_BRANCH}-${DEVICE_TARGET}-${DEVICE_SUBTARGET}"
        CACHE_KEY="${CACHE_PREFIX}-${HASH}"
        {
          echo "SOURCE_REPO=$SOURCE_REPO"
          echo "DEVICE_TARGET=$DEVICE_TARGET"
          echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET"
          echo "HASH=$HASH"
          echo "CACHE_PREFIX=$CACHE_PREFIX"
          echo "CACHE_KEY=$CACHE_KEY"
        } >> "$GITHUB_ENV"

    - name: Cache Toolchain(зј“еӯҳе·Ҙе…·й“ҫ)
      uses: actions/cache@v4
      with:
        key: ${{ env.CACHE_KEY }}
        restore-keys: |
          ${{ env.CACHE_PREFIX }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(еҲ·ж–°зј“еӯҳ)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -path "*/stamp/*" ! -path "*target*" -type f -exec touch {} + || true
        fi

    - name: Install Feeds(е®үиЈ…feeds)
      run: |
        cd "$OPENWRT_PATH"
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration(еҠ иҪҪиҮӘе®ҡд№үй…ҚзҪ®)
      run: |
        chmod +x "$GITHUB_WORKSPACE/$DIY_SCRIPT"
        cd "$OPENWRT_PATH"
        "$GITHUB_WORKSPACE/$DIY_SCRIPT"

    - name: Download DL Package(дёӢиҪҪDLиҪҜд»¶еҢ…)
      env:
        CONFIG_FILE: ${{ inputs.config_file }}
        GENERAL_CONFIG_FILE: "configs/General.config"
      run: |
        if [ ! -f "$GITHUB_WORKSPACE/$CONFIG_FILE" ]; then
          echo "вқҢ Error: Config file not found: $GITHUB_WORKSPACE/$CONFIG_FILE"
          exit 1
        fi
        
        if [ ! -f "$GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE" ]; then
          echo "вҡ пёҸ  Warning: General config file not found, using config file only"
          cp "$GITHUB_WORKSPACE/$CONFIG_FILE" "$OPENWRT_PATH/.config"
        else
          echo "вң… Merging config files..."
          cat "$GITHUB_WORKSPACE/$CONFIG_FILE" "$GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE" > "$OPENWRT_PATH/.config"
        fi
        
        cd "$OPENWRT_PATH"
        
        if [ "${{ inputs.remove_sqm_scripts_nss }}" = "true" ]; then
          echo "рҹ”§ Removing sqm-scripts-nss from config..."
          sed -i '/CONFIG_PACKAGE_sqm-scripts-nss=y/d' .config
        fi
        
        make defconfig
        make download -j"$(nproc)"

    - name: Compile Firmware(ејҖе§Ӣзј–иҜ‘еӣәд»¶)
      id: compile
      run: |
        cd "$OPENWRT_PATH"
        echo -e "$(nproc) thread compile"
        if ! make -j"$(nproc)"; then
          echo "вҡ пёҸ Multi-thread compile failed, retry single thread"
          if ! make -j1; then
            echo "вқҢ Compile failed, show verbose log"
            make -j1 V=s
            exit 1
          fi
        fi
        echo "status=success" >> "$GITHUB_OUTPUT"
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> "$GITHUB_ENV"
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> "$GITHUB_ENV"

    - name: Check Space Usage(жЈҖжҹҘз©әй—ҙдҪҝз”Ёжғ…еҶө)
      if: (!cancelled())
      run: df -hT

    - name: Organize Files(ж•ҙзҗҶж–Үд»¶)
      if: steps.compile.outputs.status == 'success'
      env:
        ARTIFACT_PREFIX: ${{ inputs.artifact_prefix }}
        MANIFEST_FILE: ${{ inputs.manifest_file }}
      run: |
        BIN_DIR="${OPENWRT_PATH}/bin/targets"
        cd $(find "${BIN_DIR}" -maxdepth 3 -type d -name "*bin" -o -name "*img" | head -1) || cd "${BIN_DIR}"/*/*

        cp "${OPENWRT_PATH}/.config" "${ARTIFACT_PREFIX}.config"
        [ -f config.buildinfo ] && mv config.buildinfo "${ARTIFACT_PREFIX}.config.buildinfo"
        [ -f "${MANIFEST_FILE}" ] && mv "${MANIFEST_FILE}" "${ARTIFACT_PREFIX}.manifest"

        mkdir -p packages
        mv -f "${OPENWRT_PATH}"/bin/packages/*/*/*.apk packages 2>/dev/null || true
        tar -zcf "${ARTIFACT_PREFIX}.Packages.tar.gz" packages

        if [ "${{ inputs.rename_qualcommax_to_nowifi }}" = "true" ]; then
          for file in *qualcommax*.bin; do
            [ -e "$file" ] && mv "$file" "${file//qualcommax/nowifi}"
          done
        fi
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> "$GITHUB_ENV"

    - name: Upload Firmware To Release(еҸ‘еёғеӣәд»¶)
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ env.DATE }} for ${{ inputs.firmware_tag }}
        allowUpdates: true
        tag: ${{ inputs.firmware_tag }}
        token: ${{ github.token }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ inputs.firmware_tag }}**
          ### рҹ“’ еӣәд»¶дҝЎжҒҜ
          - ${{ inputs.release_summary }}
          - рҹ’» иҝҷжҳҜ ${{ inputs.firmware_tag }} е№іеҸ°дҪҝз”Ёзҡ„ OpenWrt еӣәд»¶
          - вҡҪ еӣәд»¶жәҗз Ғ: ${{ inputs.repo_url }}
          - рҹ’қ жәҗз ҒеҲҶж”Ҝ: ${{ inputs.repo_branch }}
          - рҹҢҗ й»ҳи®Өең°еқҖ: **192.168.10.1**
          - рҹ”‘ й»ҳи®ӨеҜҶз Ғ: none
          ### рҹ§Ҡ еӣәд»¶зүҲжң¬
          - еӣәд»¶еҶ…ж ёзүҲжң¬пјҡ**${{ env.VERSION_KERNEL }}**
          - еӣәд»¶зј–иҜ‘еүҚжңҖеҗҺдёҖж¬ЎвһҰ[дё»жәҗз Ғ](${{ inputs.repo_url }})жӣҙж–°и®°еҪ•
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache(еҲ йҷӨж—§зј“еӯҳ)
      if: steps.compile.outputs.status == 'success'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh cache list --key "${CACHE_PREFIX}-" --json key --jq '.[].key' |
          while read -r key; do
            [ -n "$key" ] || continue
            if [ "$key" != "$CACHE_KEY" ]; then
              gh cache delete "$key" || true
            fi
          done
        echo "========cache status========"
        if [ -d "$OPENWRT_PATH/.ccache" ]; then
          echo "ccache: $(du -sh "$OPENWRT_PATH/.ccache" | cut -f 1)"
        fi
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          echo "staging: $(du -sh "$OPENWRT_PATH/staging_dir" | cut -f 1)"
        fi

    - name: Delete Old Workflows(еҲ йҷӨж—§е·ҘдҪңжөҒ)
      if: ${{ inputs.delete_old_workflows }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        cutoff="$(date -u -d '2 days ago' +%s)"
        gh run list --limit 100 --json databaseId,createdAt,status --jq '.[] | select(.status != "in_progress" and .status != "queued") | [.databaseId, .createdAt] | @tsv' |
          while IFS=$'\t' read -r run_id created_at; do
            run_ts="$(date -u -d "$created_at" +%s)"
            if [ "$run_ts" -lt "$cutoff" ]; then
              gh run delete "$run_id" || true
            fi
          done
