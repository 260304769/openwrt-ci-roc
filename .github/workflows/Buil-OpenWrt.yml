name: Buil-OpenWrt

on:
  workflow_call:
    inputs:
      repo_url:
        required: true
        type: string
      repo_branch:
        required: true
        type: string
      config_file:
        required: true
        type: string
      firmware_tag:
        required: true
        type: string
      kernel_file:
        required: true
        type: string
      artifact_prefix:
        required: true
        type: string
      manifest_file:
        required: true
        type: string
      release_summary:
        required: true
        type: string
      remove_sqm_scripts_nss:
        required: false
        type: boolean
        default: false
      rename_qualcommax_to_nowifi:
        required: false
        type: boolean
        default: false
      delete_old_workflows:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

defaults:
  run:
    shell: bash

env:
  GENERAL_CONFIG_FILE: configs/AX5.config
  DIY_SCRIPT: scripts/AX5.sh
  TZ: Asia/Shanghai
  OPENWRT_MIRROR: "https://mirrors.tuna.tsinghua.edu.cn/openwrt"

jobs:
  Build:
    runs-on: ubuntu-24.04
    timeout-minutes: 420
    concurrency:
      group: openwrt-${{ inputs.artifact_prefix }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠ 服务器性能有限，插件较多时编译耗时会增加"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(grep "physical id" /proc/cpuinfo | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(grep name /proc/cpuinfo | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB || echo "No memory info") \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* 2>/dev/null | grep -v [1-9] | wc -l)"
        df -hT

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends) ccache
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@v4

    - name: Clone Source Code(克隆源代码)
      env:
        REPO_URL: ${{ inputs.repo_url }}
        REPO_BRANCH: ${{ inputs.repo_branch }}
        KERNEL_FILE: ${{ inputs.kernel_file }}
      run: |
        df -hT "$GITHUB_WORKSPACE"
        sudo mkdir -p /mnt/openwrt
        sudo chown -R "$(id -u):$(id -g)" /mnt/openwrt
        git clone --depth 1 -b "$REPO_BRANCH" --single-branch "$REPO_URL" /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> "$GITHUB_ENV"
        VERSION_INFO="$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")"
        {
          echo "VERSION_INFO<<EOF"
          echo "$VERSION_INFO"
          echo "EOF"
        } >> "$GITHUB_ENV"
        VERSION_KERNEL=$(sed -n 's/^LINUX_KERNEL_HASH-\([0-9.]*\).*/\1/p' "target/linux/generic/$KERNEL_FILE" | head -n 1 || true)
        echo "VERSION_KERNEL=${VERSION_KERNEL:-unknown}" >> "$GITHUB_ENV"

    - name: Setup ccache(编译缓存加速)
      run: |
        echo "CCACHE_DIR=$OPENWRT_PATH/.ccache" >> $GITHUB_ENV
        echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
        echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
        echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
        ccache -s

    - name: Generate Variables(生成缓存变量)
      env:
        REPO_URL: ${{ inputs.repo_url }}
        REPO_BRANCH: ${{ inputs.repo_branch }}
      run: |
        cd "$OPENWRT_PATH"
        DEVICE_TARGET=$(awk -F '"' '/CONFIG_TARGET_BOARD/ {print $2; exit}' .config 2>/dev/null || echo "unknown")
        DEVICE_SUBTARGET=$(awk -F '"' '/CONFIG_TARGET_SUBTARGET/ {print $2; exit}' .config 2>/dev/null || echo "unknown")
        HASH="$(git log -1 --pretty=format:'%h')"
        SOURCE_REPO="${REPO_URL##*/}"
        SOURCE_REPO="${SOURCE_REPO%.git}"
        CACHE_PREFIX="${SOURCE_REPO}-${REPO_BRANCH}-${DEVICE_TARGET}-${DEVICE_SUBTARGET}"
        CACHE_KEY="${CACHE_PREFIX}-${HASH}"
        {
          echo "SOURCE_REPO=$SOURCE_REPO"
          echo "DEVICE_TARGET=$DEVICE_TARGET"
          echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET"
          echo "HASH=$HASH"
          echo "CACHE_PREFIX=$CACHE_PREFIX"
          echo "CACHE_KEY=$CACHE_KEY"
        } >> "$GITHUB_ENV"

    - name: Cache Toolchain(缓存 dl/ccache/staging_dir)
      uses
