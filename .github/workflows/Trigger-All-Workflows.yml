name: Trigger-All-Workflows

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * 5"

permissions:
  contents: write
  actions: write

jobs:
  IPQ60XX-LibWrt:
    uses: ./.github/workflows/IPQ60XX-LibWrt.yml

  AX5-LibWrt:
    needs: IPQ60XX-LibWrt
    uses: ./.github/workflows/AX5-libwrt.yml

  IPQ807X-LibWrt:
    needs: AX5-LibWrt
    uses: ./.github/workflows/IPQ807X-LibWrt.yml

  JDCloud-ImmortalWrt:
    needs: IPQ807X-LibWrt
    uses: ./.github/workflows/JDCloud-ImmortalWrt.yml

  JDCloud-NoWiFi-ImmortalWrt:
    needs: JDCloud-ImmortalWrt
    uses: ./.github/workflows/JDCloud-NoWiFi-ImmortalWrt.yml

  x86-64-ImmortalWrt:
    needs: JDCloud-NoWiFi-ImmortalWrt
    uses: ./.github/workflows/x86-64-ImmortalWrt.yml
