name: IPQ60XX-LibWrt

on:
  workflow_dispatch:
  workflow_call:

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/IPQ60XX.config
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  CLASH_KERNEL: amd64
  FIRMWARE_TAG: IPQ60XX
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-24.04

    steps:
    # ==================== 1. 检查服务器性能 ====================
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    # ==================== 2. 初始化环境 ====================
    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    # ==================== 3. 检出代码 ====================
    - name: Checkout(检出代码)
      uses: actions/checkout@main

    # ==================== 4. 克隆源代码 ====================
    - name: Clone Source Code(克隆源代码)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    # ==================== 5. 生成变量 ====================
    - name: Generate Variables(生成变量)
      run: |
        cat $GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE $GITHUB_WORKSPACE/$CONFIG_FILE > $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    # ==================== 6. 缓存工具链 ====================
    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    # ==================== 7. 刷新缓存 ====================
    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    # ==================== 8. 安装Feeds ====================
    - name: Install Feeds(安装feeds)
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ==================== 9. 加载自定义配置 ====================
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    # ==================== 10. 合并配置并下载 ====================
    - name: Merge Config and Download DL Package(合并配置并下载DL软件包)
      run: |
        cd $OPENWRT_PATH
        cat $GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE $GITHUB_WORKSPACE/$CONFIG_FILE > $OPENWRT_PATH/.config
        make defconfig
        make download -j$(nproc)

    # ==================== 11. 编译固件 ====================
    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        echo "Disk space before compile:"
        df -h $OPENWRT_PATH
        make -j$(nproc) V=s 2>&1 | tee /tmp/build.log || {
          echo "Multi-thread compile failed, trying single thread..."
          make -j1 V=s 2>&1 | tee /tmp/build-single.log
        }
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    # ==================== 12. 检查空间 ====================
    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    # ==================== 13. 整理文件输出固件 ====================
    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        echo "====== 开始整理编译产物 ======"
        
        # 查找编译输出目录
        FW_DIR=$(find $OPENWRT_PATH/bin/targets -type d -name "ipq60xx" | head -1)
        if [ -z "$FW_DIR" ]; then
          FW_DIR=$(find $OPENWRT_PATH/bin/targets -type d -name "qualcommax" | head -1)
        fi
        if [ -z "$FW_DIR" ]; then
          FW_DIR=$(find $OPENWRT_PATH/bin/targets -type d | head -1)
        fi
        
        echo "固件目录: $FW_DIR"
        ls -lahR "$FW_DIR" 2>/dev/null || echo "目录为空"
        
        # 创建发布目录
        RELEASE_DIR=$OPENWRT_PATH/release
        mkdir -p $RELEASE_DIR
        
        # 复制固件文件
        if [ -d "$FW_DIR" ]; then
          cd "$FW_DIR"
          
          # 复制各类固件
          for ext in bin ubi img img.gz itb trx chk; do
            find . -maxdepth 1 -name "*.$ext" -exec cp -v {} $RELEASE_DIR/ \; 2>/dev/null || true
          done
          find . -maxdepth 1 -name "*sysupgrade*" -exec cp -v {} $RELEASE_DIR/ \; 2>/dev/null || true
          find . -maxdepth 1 -name "*factory*" -exec cp -v {} $RELEASE_DIR/ \; 2>/dev/null || true
          
          # 复制配置
          if [ -f .config ]; then
            cp .config $RELEASE_DIR/IPQ60XX.config 2>/dev/null || true
          fi
          
          # 复制 buildinfo
          if [ -f config.buildinfo ]; then
            cp config.buildinfo $RELEASE_DIR/IPQ60XX.buildinfo 2>/dev/null || true
          fi
          
          # 复制 manifest
          find . -maxdepth 1 -name "*.manifest" -exec cp {} $RELEASE_DIR/IPQ60XX.manifest \; 2>/dev/null || true
        fi
        
        # 收集软件包
        echo "收集软件包..."
        PKG_DIR=$RELEASE_DIR/packages
        mkdir -p $PKG_DIR
        find $OPENWRT_PATH/bin/packages -name "*.ipk" -exec cp {} $PKG_DIR/ \; 2>/dev/null || true
        find $OPENWRT_PATH/bin/packages -name "*.apk" -exec cp {} $PKG_DIR/ \; 2>/dev/null || true
        
        # 打包软件包
        cd $RELEASE_DIR
        if [ "$(ls -A $PKG_DIR 2>/dev/null)" ]; then
          tar -zcf packages.tar.gz -C $RELEASE_DIR packages
          rm -rf $PKG_DIR
        fi
        
        # 生成SHA256
        sha256sum * 2>/dev/null > sha256sums.txt || true
        
        # 输出文件清单
        echo ""
        echo "====== 发布文件清单 ======"
        ls -lah $RELEASE_DIR/
        echo ""
        echo "固件文件:"
        ls -1 $RELEASE_DIR/*.bin $RELEASE_DIR/*.ubi $RELEASE_DIR/*.img $RELEASE_DIR/*.img.gz 2>/dev/null || echo "  (未找到)"
        echo ""
        echo "升级文件:"
        ls -1 $RELEASE_DIR/*sysupgrade* 2>/dev/null || echo "  (未找到)"
        echo ""
        echo "工厂文件:"
        ls -1 $RELEASE_DIR/*factory* 2>/dev/null || echo "  (未找到)"
        
        echo "FIRMWARE_PATH=$RELEASE_DIR" >> $GITHUB_ENV
        echo "====== 整理完成 ======"

    # ==================== 14. 发布到Release ====================
    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          
          ### 固件信息
          - 开启全功能 NSS 的 6.12 内核固件
          - 主题: Argon
          - 平台: ${{ env.FIRMWARE_TAG }}
          - 源码: ${{ env.REPO_URL }}
          - 分支: ${{ env.REPO_BRANCH }}
          
          ### 默认设置
          - 地址: **192.168.10.1**
          - 密码: **无**
          - WiFi 2.4G: **001** / **11111111**
          - WiFi 5G: **001-5G** / **11111111**
          
          ### 版本
          - 内核: **${{ env.VERSION_KERNEL }}**
          - 更新: ${{ env.VERSION_INFO }}
          
          ### 支持设备
          - 红米 AX5 / AX5 JDCloud
          - 小米 AX1800
          - 360 V6
          - 京东云 RE-CS-02
          - 兆能 M2

    # ==================== 15. 删除旧缓存 ====================
    - name: Delete Old Cache(删除旧缓存)
      run: |
        gh cache list --key ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
