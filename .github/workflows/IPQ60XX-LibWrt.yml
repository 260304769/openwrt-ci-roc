name: IPQ60XX-LibWrt

on:
  workflow_dispatch:
  workflow_call:

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/IPQ60XX.config
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  FIRMWARE_TAG: IPQ60XX
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-24.04
    steps:
    - name: Check Server Performance
      run: |
        echo "иӯҰе‘Ҡвҡ  CPUиө„жәҗжңүйҷҗпјҢжҸ’д»¶иҝҮеӨҡе®№жҳ“зј–иҜ‘еӨұиҙҘ"
        echo "CPUж ёеҝғ:$(grep 'model name' /proc/cpuinfo|uniq -c)"
        echo "еҶ…еӯҳ:"$(sudo lshw -short -C memory|grep GiB||true)
        df -hT

    - name: Initialization Environment
      env: {DEBIAN_FRONTEND: noninteractive}
      run: |
        sudo apt update
        sudo apt install -y $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
        sudo timedatectl set-timezone $TZ

    - name: Checkout
      uses: actions/checkout@main

    - name: Clone Source Code
      run: |
        sudo mkdir -p /mnt/openwrt
        sudo chown $USER:$USER /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >>$GITHUB_ENV
        echo "VERSION_INFO=$(git show -s --date=short --format='дҪңиҖ…: %an<br/>ж—¶й—ҙ: %cd<br/>еҶ…е®№: %s<br/>hash: %H')" >>$GITHUB_ENV
        echo "VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[\d.]+' target/linux/generic/kernel-6.12||true)" >>$GITHUB_ENV

    - name: Generate Variables # гҖҗе”ҜдёҖдёҖж¬ЎеҶҷе…Ҙ.configгҖ‘
      run: |
        cat $GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE $GITHUB_WORKSPACE/$CONFIG_FILE >$OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig >/dev/null 2>&1
        echo "SOURCE_REPO=$(basename $REPO_URL .git)" >>$GITHUB_ENV
        echo "DEVICE_TARGET=$(awk -F'"' '/CONFIG_TARGET_BOARD/{print $2}' .config)" >>$GITHUB_ENV
        echo "DEVICE_SUBTARGET=$(awk -F'"' '/CONFIG_TARGET_SUBTARGET/{print $2}' .config)" >>$GITHUB_ENV
        echo "SHORT_HASH=$(git rev-parse --short HEAD)" >>$GITHUB_ENV

    - name: Cache Toolchain # з§»йҷӨCACHE_DATEпјҢkeyж— з©әж ј
      uses: actions/cache@main
      with:
        key: ${{env.SOURCE_REPO}}-${{env.REPO_BRANCH}}-${{env.DEVICE_TARGET}}-${{env.DEVICE_SUBTARGET}}-${{env.SHORT_HASH}}
        restore-keys: ${{env.SOURCE_REPO}}-${{env.REPO_BRANCH}}-${{env.DEVICE_TARGET}}-${{env.DEVICE_SUBTARGET}}-
        path: |
          ${{env.OPENWRT_PATH}}/.ccache
          ${{env.OPENWRT_PATH}}/staging_dir

    - name: Refresh Cache Stamp
      run: |
        [ -d $OPENWRT_PATH/staging_dir ] && find $OPENWRT_PATH/staging_dir -name stamp -not -path "*target*" -exec find {} -type f -exec touch {} + \;

    - name: Install Feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Run DIY Script
      run: |
        [ -f $GITHUB_WORKSPACE/$DIY_SCRIPT ] && chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT && cd $OPENWRT_PATH && $GITHUB_WORKSPACE/$DIY_SCRIPT
        make defconfig >/dev/null 2>&1

    - name: Download Source
      run: |
        cd $OPENWRT_PATH
        make download -j$(nproc) || make download -j1

    - name: Compile Firmware
      id: compile
      run: |
        cd $OPENWRT_PATH
        make -j$(nproc) V=s || make -j1 V=s
        echo "status=success">>$GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")">>$GITHUB_ENV
        echo "FILE_DATE=$(date +%Y.%m.%d)">>$GITHUB_ENV

    - name: Check Disk
      if: !cancelled()
      run: df -hT

    - name: Organize Firmware # е…ЁеұҖfindжҗңеҜ»жүҖжңүеӣәд»¶
      if: steps.compile.outputs.status == 'success'
      run: |
        RELEASE_DIR=$OPENWRT_PATH/release
        mkdir -p $RELEASE_DIR
        find $OPENWRT_PATH/bin/targets -type f \( -name "*.bin" -o -name "*.ubi" -o -name "*.img" -o -name "*sysupgrade*" -o -name "*factory*" \) -exec cp {} $RELEASE_DIR/ \;
        cp $OPENWRT_PATH/.config $RELEASE_DIR/IPQ60XX.config
        find $OPENWRT_PATH/bin/targets -name config.buildinfo -exec cp {} $RELEASE_DIR/IPQ60XX.buildinfo \;
        find $OPENWRT_PATH/bin/targets -name *.manifest -exec cp {} $RELEASE_DIR/IPQ60XX.manifest \;
        mkdir -p $RELEASE_DIR/packages
        find $OPENWRT_PATH/bin/packages -name *.ipk -exec cp {} $RELEASE_DIR/packages/ \;
        [ -d "$RELEASE_DIR/packages" ] && tar -zcf $RELEASE_DIR/packages.tar.gz -C $RELEASE_DIR packages && rm -rf $RELEASE_DIR/packages
        cd $RELEASE_DIR && sha256sum * >sha256sums.txt
        echo "FIRMWARE_PATH=$RELEASE_DIR">>$GITHUB_ENV
        ls -lh $RELEASE_DIR

    - name: Release Upload
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@main
      with:
        name: ${{env.DATE}} for ${{env.FIRMWARE_TAG}}
        allowUpdates: true
        tag: ${{env.FIRMWARE_TAG}}
        token: ${{secrets.GITHUB_TOKEN}}
        artifacts: ${{env.FIRMWARE_PATH}}/*
        body: |
          ### IPQ60XX NSS OpenWrt 6.12
          - LAN:192.168.10.1 | ж— еҜҶз Ғ
          - WiFi 2.4G:001 / 11111111 | 5G:001-5G / 11111111
          - Kernel:${{env.VERSION_KERNEL}}
          - Source:${{env.REPO_URL}} Branch:${{env.REPO_BRANCH}}
          - йҖӮй…ҚпјҡAX5/AX1800/V6/дә¬дёңдә‘/е…ҶиғҪM2

    - name: Clear Old Cache
      run: |
        gh cache list --key ${{env.SOURCE_REPO}}-${{env.REPO_BRANCH}}-${{env.DEVICE_TARGET}}-${{env.DEVICE_SUBTARGET}}- --json|jq -r '.[].key'|xargs -I{} gh cache delete "{}"
        echo "CCACHE:$(du -sh $OPENWRT_PATH/.ccache|awk '{print $1}') STAGING:$(du -sh $OPENWRT_PATH/staging_dir|awk '{print $1}')"
      env: {GH_TOKEN: ${{secrets.GITHUB_TOKEN}}}
