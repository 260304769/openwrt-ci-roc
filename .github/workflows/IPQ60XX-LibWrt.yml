name: IPQ60XX-LibWrt

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: 0 20 * * *

env:
  REPO_URL: https://github.com/laipeng668/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/IPQ60XX.config
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  CLASH_KERNEL: amd64
  FIRMWARE_TAG: IPQ60XX
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-24.04

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12 || echo "6.12")
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV

    - name: Generate Variables(生成变量+一次性写入配置)
      run: |
        cd $OPENWRT_PATH
        
        # 检查配置文件是否存在
        echo "=== Checking config files ==="
        if [ ! -f "$GITHUB_WORKSPACE/$CONFIG_FILE" ]; then
          echo "❌ Config file not found: $CONFIG_FILE"
          exit 1
        fi
        
        # 合并配置
        echo "=== Merging config files ==="
        cat "$GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE" "$GITHUB_WORKSPACE/$CONFIG_FILE" 2>/dev/null > .config
        
        # 清理无效行（关键修复）
        echo "=== Cleaning .config ==="
        grep -E '^(# )?CONFIG_' .config > .config.clean 2>/dev/null || echo "# No valid config" > .config.clean
        mv .config.clean .config
        sed -i '/^$/d' .config
        sed -i 's/^\t//g' .config
        
        # 显示前10行用于调试
        echo "=== .config first 10 lines ==="
        head -10 .config
        
        # 运行 defconfig
        echo "=== Running make defconfig ==="
        make defconfig 2>&1 | tee defconfig.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "❌ make defconfig failed!"
          echo "=== defconfig.log ==="
          cat defconfig.log
          exit 1
        fi
        
        # 提取变量
        echo "=== Extracting variables ==="
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}' | sed 's/.git//')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        
        DEVICE_TARGET=$(awk -F '"' '/CONFIG_TARGET_BOARD/ {print $2}' .config 2>/dev/null || echo "qualcommax")
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        
        DEVICE_SUBTARGET=$(awk -F '"' '/CONFIG_TARGET_SUBTARGET/ {print $2}' .config 2>/dev/null || echo "ipq60xx")
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        
        SHORT_HASH=$(git log -1 --pretty=format:'%h' 2>/dev/null || echo "unknown")
        echo "SHORT_HASH=$SHORT_HASH" >> $GITHUB_ENV
        
        echo "✅ Generate Variables completed"
        echo "DEVICE_TARGET: $DEVICE_TARGET"
        echo "DEVICE_SUBTARGET: $DEVICE_SUBTARGET"
        echo "SHORT_HASH: $SHORT_HASH"

    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.SHORT_HASH }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration(执行DIY补丁脚本)
      run: |
        if [ -f "$GITHUB_WORKSPACE/$DIY_SCRIPT" ]; then
          chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
          cd $OPENWRT_PATH
          $GITHUB_WORKSPACE/$DIY_SCRIPT
          echo "✅ DIY script executed"
        else
          echo "⚠️ DIY script not found: $DIY_SCRIPT, skipping"
        fi

    - name: Final Defconfig(最终配置校正)
      run: |
        cd $OPENWRT_PATH
        make defconfig
        echo "✅ Final defconfig completed"

    - name: Download DL Package(下载源码包)
      run: |
        cd $OPENWRT_PATH
        make download -j$(nproc) || make download -j1

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        
        if make -j$(nproc) 2>&1 | tee build.log; then
          echo "✅ Parallel compile success"
        elif make -j1 2>&1 | tee build.log; then
          echo "✅ Single thread compile success"
        else
          echo "❌ Compilation failed!"
          echo "=== Last 100 lines of build.log ==="
          tail -100 build.log
          exit 1
        fi
        
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        cp $OPENWRT_PATH/.config IPQ60XX.config
        [ -f config.buildinfo ] && mv config.buildinfo IPQ60XX.config.buildinfo
        [ -f libwrt-qualcommax-ipq60xx.manifest ] && mv libwrt-qualcommax-ipq60xx.manifest IPQ60XX.manifest
        mkdir -p packages
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.ipk packages/ 2>/dev/null || true
        tar -zcf IPQ60XX.Packages.tar.gz packages 2>/dev/null || true
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json 2>/dev/null || true
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "✅ Firmware organized"

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 全NSS硬件加速 6.12内核，默认IP:192.168.10.1
          - 源码: ${{ env.REPO_URL }} | 分支:${{ env.REPO_BRANCH }}
          - 内核版本：${{ env.VERSION_KERNEL }}
          - 源码提交记录：${{ env.VERSION_INFO }}

    - name: Delete Old Cache(删除旧缓存)
      if: always()
      run: |
        echo "=== Deleting old caches ==="
        gh cache list --key ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[].key' | while read -r key; do
          echo "Deleting cache: $key"
          gh cache delete "$key" || true
        done
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache 2>/dev/null | cut -f 1 || echo '0')"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir 2>/dev/null | cut -f 1 || echo '0')"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
